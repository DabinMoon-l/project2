# RabbiTory CI — PR 게이트
#
# - 프론트엔드(Next.js)와 Cloud Functions를 별도 잡으로 병렬 실행
# - 각 잡: npm ci → lint → build → test
# - E2E(Playwright)는 무거워 별도 워크플로우에서 처리할 예정 (Phase B)
# - 동일 브랜치 푸시 시 이전 실행은 자동 취소

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # 프론트 lint는 Next.js 16 lint 명령 제거로 깨진 상태.
      # ESLint v9 flat config 마이그레이션 후 활성화 예정 (Phase A 후속 task).
      # 현재는 build의 type 검사로 회귀 차단.

      - name: Build
        run: npm run build
        env:
          # 빌드 시 정적으로 평가되는 NEXT_PUBLIC_* 가 누락되면 깨질 수 있어
          # 더미 값 주입. 실제 배포는 Vercel 환경변수 사용.
          NEXT_PUBLIC_FIREBASE_API_KEY: "ci-dummy"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci-dummy.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-dummy"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci-dummy.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "ci-dummy"
          NEXT_PUBLIC_SUPABASE_URL: "https://ci-dummy.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-dummy"

      - name: Unit tests (Vitest)
        run: npm test

  functions:
    name: Cloud Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      # 누적된 lint 부채(정규식 escape, 빈 catch 블록) 정리 전까지는
      # 빌드를 막지 않음. continue-on-error로 가시화만.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build (TypeScript)
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test
